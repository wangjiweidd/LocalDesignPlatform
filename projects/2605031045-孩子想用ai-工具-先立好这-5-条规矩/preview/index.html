    font-weight: 700;

  .cover {

    border-radius: 18px;
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
  }
  .cover .footer-note .bulb {
    width: 40px; height: 40px; flex: 0 0 auto;
  }
  .frame {
    padding: 56px 80px 80px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .frame .topbar {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 16px;
  }
  .frame .topbar::after {
    content: "";
    width: 2px;
    height: 34px;
    background: #F1C47E;
    order: 1;
  }
  .frame .topbar em {
    order: 2;
    font-style: normal;
    font-size: 32px;
    color: var(--note);
    font-weight: 700;
  }
  .frame .badge { order: 0; transform: scale(1.22); transform-origin: left center; }

  .progress {
    margin: 62px auto 0;
    width: 38%;
    height: 8px;
    background: #FFE6C8;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress > span {

    height: 100%;
    width: 72%;

  .highlight { color: var(--orange); }
  .highlight.underline { text-decoration: underline wavy var(--orange); text-underline-offset: 6px; }
