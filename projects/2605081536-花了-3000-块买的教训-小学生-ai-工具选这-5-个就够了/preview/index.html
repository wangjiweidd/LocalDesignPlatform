<html lang="zh-CN">

<meta charset="UTF-8" />
<title>花了 3000 块买的教训！小学生 AI 工具选这 5 个就够了 · 曜宁视频预览</title>
<style>
  :root {
    --bg-start: #FFF6E2;
    --bg-end: #FFE9C4;
    --orange: #E07A14;
    --gold: #FFB52E;
    --purple: #6F62A8;
    --ink: #1F1408;
    --note: #5F3B13;
    --pill-border: #F1C47E;
    --shadow-light: 0 2px 6px rgba(176, 110, 38, 0.18);
    --shadow-strong: 0 8px 24px rgba(176, 110, 38, 0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-start);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 0;
  }
  .stage {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
    box-shadow: var(--shadow-strong);
    position: relative;
    overflow: hidden;
    transform-origin: top center;
  }
  .stage-label {
    position: absolute;
    top: 18px;
    right: 24px;
    color: rgba(31, 20, 8, 0.4);
    font: 600 16px/1 ui-monospace, Menlo, monospace;
    letter-spacing: 0.04em;
    z-index: 5;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: #FFFFFF;
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    box-shadow: var(--shadow-light);
    font-size: 20px;
    font-weight: 700;
    color: var(--note);
    letter-spacing: 0.02em;
  }
  .badge svg { width: 24px; height: 24px; }
  .cover {
    padding: 64px 80px 42px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .cover .badge { align-self: center; }
  .cover h1 {
    margin-top: 34px;
    text-align: center;
    font-size: 100px;
    line-height: 1.16;
    letter-spacing: 0.02em;
    font-weight: 800;
    color: var(--ink);
  }
  .cover .illustration {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 14px 0 22px;
  }
  .cover .footer-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 18px 28px;
    background: rgba(255, 255, 255, 0.55);
    border: 2px solid var(--pill-border);
    border-radius: 18px;
    font-size: 28px;
    font-weight: 700;
    color: var(--note);
  }
  .cover .footer-note .bulb {
    width: 34px;
    height: 34px;
    flex: 0 0 auto;
  }
  .frame {
    padding: 56px 80px 80px;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .frame .topbar {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 16px;
  }
  .frame .topbar em {
    font-style: normal;
    font-size: 28px;
    color: var(--note);
    font-weight: 700;
  }
  .frame .divider {
    width: 2px;
    height: 42px;
    background: rgba(31, 20, 8, 0.18);
  }
  .frame .illustration {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .frame .hero {
    margin-top: 26px;
    text-align: center;
    font-size: 112px;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .progress {
    margin: 40px auto 0;
    width: 38%;
    height: 6px;
    background: #FFE6C8;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress > span {
    display: block;
    height: 100%;
    width: 74%;
    background: var(--orange);
    border-radius: 3px;
  }
  .highlight { color: var(--orange); }
  .highlight.underline {
    text-decoration: underline wavy var(--orange);
    text-underline-offset: 8px;
  }
  .robot-float { animation: robotFloat 2.4s ease-in-out infinite; transform-origin: 50% 70%; }
  .tablet-flash { animation: tabletFlash 1.8s ease-in-out infinite; }
  .spark-pop { animation: sparkPop 1.2s ease-in-out infinite; transform-origin: center; }
  .line-draw { stroke-dasharray: 120; stroke-dashoffset: 120; animation: drawLine 2.2s ease-in-out infinite; }
  .magnifier-scan { animation: scan 2.2s ease-in-out infinite; transform-origin: center; }
  .warning-shake { animation: warningShake 1.6s ease-in-out infinite; transform-origin: center; }
  @keyframes robotFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-14px) rotate(1deg); }
  }
  @keyframes tabletFlash {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.68; }
  }
  @keyframes sparkPop {
    0%, 100% { transform: scale(0.94); opacity: 0.72; }
    50% { transform: scale(1.12); opacity: 1; }
  }
  @keyframes drawLine {
    0% { stroke-dashoffset: 120; }
    48%, 100% { stroke-dashoffset: 0; }
  }
  @keyframes scan {
    0%, 100% { transform: translateX(-18px) rotate(-8deg); }
    50% { transform: translateX(28px) rotate(6deg); }
  }
  @keyframes warningShake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }
</style>
</head>
